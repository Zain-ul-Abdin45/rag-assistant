[loggers]
keys=root,rag_assistant

[handlers]
keys=console

[formatters]
keys=detailed

[logger_root]
level=WARNING
handlers=console

[logger_rag_assistant]
level=DEBUG
handlers=console
qualname=rag_assistant
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=detailed
args=(sys.stdout,)

[formatter_detailed]
format=%(asctime)s | %(levelname)-8s | %(name)-28s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
